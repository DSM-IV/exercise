<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMarket - 학습 자료 마켓</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">StudyMarket</a>
      <nav class="nav">
        <a href="#" class="nav-link active" data-page="home">둘러보기</a>
        <a href="#" class="nav-link" data-page="upload">자료 올리기</a>
      </nav>
    </div>
  </header>

  <!-- 메인 -->
  <main class="container">

    <!-- 홈 페이지: 검색 + 자료 목록 -->
    <section id="page-home" class="page">
      <div class="hero">
        <h1>필요한 학습 자료를 찾아보세요</h1>
        <p>직접 공부한 자료를 사고팔 수 있는 마켓</p>
      </div>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="자료 검색 (제목, 과목, 키워드)" />
        <select id="category-filter">
          <option value="all">전체 카테고리</option>
          <option value="programming">프로그래밍</option>
          <option value="math">수학</option>
          <option value="science">과학</option>
          <option value="language">어학</option>
          <option value="exam">시험/자격증</option>
          <option value="etc">기타</option>
        </select>
      </div>

      <div id="materials-grid" class="materials-grid">
        <!-- JS로 렌더링 -->
      </div>

      <p id="no-results" class="no-results" hidden>검색 결과가 없습니다.</p>
    </section>

    <!-- 업로드 페이지 -->
    <section id="page-upload" class="page" hidden>
      <h2 class="page-title">자료 올리기</h2>

      <form id="upload-form" class="upload-form">
        <label>
          제목
          <input type="text" id="upload-title" placeholder="예: 운영체제 중간고사 정리노트" required />
        </label>

        <label>
          설명
          <textarea id="upload-desc" rows="4" placeholder="자료에 대한 간단한 설명을 적어주세요" required></textarea>
        </label>

        <label>
          카테고리
          <select id="upload-category" required>
            <option value="">선택하세요</option>
            <option value="programming">프로그래밍</option>
            <option value="math">수학</option>
            <option value="science">과학</option>
            <option value="language">어학</option>
            <option value="exam">시험/자격증</option>
            <option value="etc">기타</option>
          </select>
        </label>

        <label>
          가격 (원)
          <input type="number" id="upload-price" min="0" step="100" placeholder="0이면 무료" required />
        </label>

        <label>
          파일
          <input type="file" id="upload-file" />
          <span class="file-hint">PDF, 이미지, ZIP 등</span>
        </label>

        <button type="submit" class="btn-primary">등록하기</button>
      </form>
    </section>

  </main>

  <!-- 자료 상세 모달 -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script defer src="/main.js"></script>
</body>
</html>
